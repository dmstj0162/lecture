<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>선택자</title>
    <link rel="stylesheet" href="style.css" />
    <!-- 내부 스타일 시트 <head> 안에 <style> 태그 사용 -->
    <!-- <style>
      /*CSS의 기본 문법
         선택자{
            속성 :값;
            속성: 값;
         }*/

      /* 태그 선택자 : HTML 태그 이름을 그대로 사용
      h2 {
        color: red;
      }

      /*클래스 선택자: 점(.)으로 시작. 여러 요소에 '별명'을 붙여 그룹으로 꾸밀 때 사용*/
      /*클래스는 중복이 가능하지만, id는 하나만 가능함*/
      .highlight-text {
        background-color: aquamarine;
      }

      /*아이디 선택자: 샵(#)으로 시작. 페이지에서 '단 하나뿐인' 요소에 '이름표'를 붙일 때 사용*/
      #blue-text {
        color: blue;
      }

      /*후손 선택자: 띄어쓰기로 구분. 특정 요소 '안에 있는' 모든 후손을 선택*/
      #lecture-list li {
        font-weight: bold;
      }

      /*자손 선택자: > 기호로 구분. 특정 요소의 '바로 아래 자식'민 선택*/
      body > p {
        font-size: 20px;
      } */
    </style> -->
  </head>
  <body>
    <h1>CSS 선택자</h1>
    <p>
      CSS는 HTML 뼈대에 디자인 옷을 입히는 언어이다. 내가 꾸미고 싶은 대상을
      정확히 '선택'하는 것이 가장 중요하다.
    </p>

    <h2>오늘의 강의 목록</h2>
    <ul id="lecture-list">
      <li>태그 선택자</li>
      <li class="highlight-text">클래스 선택자</li>
      <li id="blue-text">아이디 선택자</li>
      <li class="highlight-text">후손/자손 선택자</li>
    </ul>

    <p style="color: green; font-style: italic">
      이 문단은 인라인 스타일로 직접 꾸몄습니다.
    </p>
  </body>
</html>
