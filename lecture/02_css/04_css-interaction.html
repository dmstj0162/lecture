<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>인터랙션</title>
    <style>
      .button {
        display: inline-block;
        padding: 15px 30px;
        background-color: rgb(73, 126, 16);
        margin: 20px;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        transition: all 0.3s ease;
      }

      /*1. Hover: 마우스 커서를 올렸을 때의 상태를 선택*/
      .button:hover {
        background-color: rgb(49, 51, 51);
        /*transform: 요소의 모양 변형*/
        transform: translateY(-5px);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
      }
      /*2. Active: 요소를 클릭하고 있는 동안의 상태 선택*/
      .button:active {
        transform: translateY(-2px);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.02);
      }
    </style>
  </head>
  <body>
    <h1>마우스 반응과 부드러운 효과</h1>
    <p>
      가상 클래스 선택자(:hover)와 트랜지션(transition)을 이용해 인터랙션 할 수
      있다.
    </p>

    <a href="#" class="button">마우스를 올려보세용</a>
  </body>
</html>
