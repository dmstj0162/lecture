<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect, useCallback } = React;

        function App() {

            const [number, setNumber] = useState(0);
            const [toggle, setToggle] = useState(false);

            const printNumber = useCallback(() => {
                console.log('current number: ', number);
            }, [number]); //number 값이 바뀔때만 이 함수를 새로 만들어라

            // const printNumber = () => {
            //     console.log('current number: ', number);
            // }

            useEffect(() => {
                console.log('printNumber 함수가 변경 되었습니다. ')
            }, [printNumber]);

            //toggle은 기본값이 false라서 인자값에 !붙임

            return (
                <>
                    <input type="number" value={number} onChange={e => parseInt(setNumber(e.target.value))} />
                    <button onClick={printNumber}>숫자 출력</button>
                    <hr />
                    <button onClick={() => setToggle(!toggle)}>토글 버튼</button>
                    <p>토글 상태: {String(toggle)}</p>
                    {/*불린 값은 문자열로 바꿔야 JSX 문법으로 화면에 표시된다.*/}
                </>
            )
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
