<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        /*1. 클래스형 컴포넌트: 앞 글자를 반드시 대문자로 시작*/
        //거의 쓰지 않음
        class TitleClass extends React.Component {
            render() {
                return React.createElement(
                    'h1',
                    { className: "classComponent" },
                    '클래스형 컴포넌트입니다.'
                )
            }
        }

        /*2. 함수형 컴포넌트*/
        function OldWayComponent() {
            return React.createElement(
                'div',
                null,
                React.createElement('h1', { className: 'greeting' }, 'createElement 방식'),
                React.createElement('p', null, '코드가 길고 복잡해짐')
            );
        }

        /* 3. JSX 방식*/
        function NewWayComponent() {
            return (
                <div>
                    <h1 className="greeting">JSX 방식</h1>
                    <p>코드가 간단하다</p>
                </div>
            );
        }

        function App() {
            return (
                //여러 요소를 하나로 묶어주기 위한 빈 태그(Fragment)
                <>
                    <OldWayComponent />
                    <hr />
                    <NewWayComponent />
                </>
            )
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
