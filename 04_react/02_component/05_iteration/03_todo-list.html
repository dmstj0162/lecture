<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        const { useState } = React;

        // TodoItem 컴포넌트(UI)
        // props: todo, onRemove, onToggle
        function TodoItem({ todo, onRemove, onToggle }) {
            return (
                <p>
                    <input type="checkbox" checked={todo.isDone} onChange={() => onToggle(todo.id)} />
                    <span style={{
                        textDecoration: todo.isDone ? 'line-through' : 'none'
                    }}>{todo.text}</span>
                    <button onClick={() => onRemove(todo.id)}>x</button>
                </p >
            )
        }

        // TodoList 컴포넌트
        function TodoList() {
            // 상태(state) 만들기
            const [todos, setTodos] = useState([]);
            const [inputValue, setInputValue] = useState('');
            // const [todos, setTodos] = useState([{ id: 1, text: "아침먹기" }]);
            const [nextId, setNextId] = useState(2);

            // 함수들 구현

            // 입력값 변경
            const handleChange = (e) => setInputValue(e.target.value);
            const handleAdd = () => {
                if (inputValue.trim() === '') return;
                const newTodo = { id: nextId, text: inputValue, isDone: false };

                setTodos([...todos, newTodo]);
                setNextId(nextId + 1);
                setInputValue('');
            };
            const handleRemove = (id) => {
                const updateTodos = todos.filter(todo => todo.id !== id);
                setTodos(updateTodos);
            };

            const handleToggle = (id) => {
                setTodos(
                    todos.map(todo => todo.id === id ? { ...todo, isDone: !todo.isDone } : todo)
                )

            };

            return (
                <div>
                    <h3>Todo List</h3>

                    <input type="text" value={inputValue} onChange={handleChange} />
                    <button onClick={handleAdd}>추가</button>

                    <div>
                        {todos.map(todo => (
                            <TodoItem key={todo.id} todo={todo} onRemove={handleRemove} onToggle={handleToggle} d />
                        ))}
                    </div>
                </div>
            )

        }

        function App() {
            return (
                <div>
                    <h1>오늘의 할일</h1>
                    <TodoList />
                </div>
            )
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
