<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>글자와 상자</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Batang&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Gowun Batang", serif;
        line-height: 1.8;
      }

      h1 {
        color: blue; /*색상 코드, 16진수, rgb, rgba 등으로 표현 가능*/
        font-size: 2rem;
        font-weight: bold;
        text-align: center; /*텍스트 정렬*/
      }

      .box {
        background-color: aliceblue;
        width: 300px;
        height: 150px;
        padding: 20px; /*테두리 안쪽 여백*/
        border: 2px dashed gray;
        margin: 30px; /*테두리 바깥 여백(다른 요소와의 간격)*/
      }

      .rounded-box {
        background-color: rgb(18, 114, 199);
        color: white;
        padding: 10px;
        margin: 10px;
        border-radius: 20px; /*모서리를 둥글게*/
        box-shadow: 10px 10px 15px firebrick;
      }
    </style>
  </head>
  <body>
    <h1>글자와 상자 꾸미기</h1>
    <p>
      CSS의 핵심은 글자를 보기 좋게 만들고, 각 요소가 차지하는 '상자'의 모양과
      간격을 조절하는 것이다.
    </p>

    <div class="box">
      이것은 기본 상자입니다. 안쪽 여백(padding), 테두리(border), 바깥
      여백(margin)을 가지고 있습니다.
    </div>

    <div class="rounded-box">
      이것은 모서리가 둥글고 그림자가 있는 상자입니다.
    </div>
  </body>
</html>
